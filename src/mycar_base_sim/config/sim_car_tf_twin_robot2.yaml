sim_car_tf_twin_robot2:
  ros__parameters:
    # Match robot1 behavior: drive Gazebo from localization TF so RViz initial
    # pose updates move the simulated model as well.
    pose_source: tf
    odom_topic: /car2/odom

    global_frame: map
    base_frame: base_footprint

    cmd_vel_topic: /car2/cmd_vel

    set_entity_service: /set_entity_state
    model_name: V550_akm_robot_2
    reference_frame: world

    rear_wheel_command_topic: /robot2/rear_wheel_velocity_controller/commands
    steering_command_topic: /robot2/steering_position_controller/commands

    max_linear_speed: 1.2
    max_right_front_steering_angle: 0.5
    max_left_front_steering_angle: 0.5

    wheel_base: 0.143
    track_width: 0.162
    wheel_radius: 0.032
    z_offset: 0.05
    gazebo_x_offset: 0.0
    gazebo_y_offset: 0.0
    gazebo_yaw_offset: 0.0

    publish_rate: 30.0
    pose_filter_alpha: 0.05
    yaw_filter_alpha: 0.05
    reset_jump_distance: 2.0
    reset_jump_yaw: 3.14
    cmd_vel_timeout_sec: 0.5
    invert_rear_wheel_speed: true
