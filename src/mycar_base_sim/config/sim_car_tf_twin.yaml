sim_car_tf_twin:
  ros__parameters:
    # Pose source from real robot localization:
    global_frame: map
    base_frame: base_footprint

    # Wheel animation source from Nav2 controller:
    # linear.x  = vehicle speed
    # angular.z = yaw rate
    cmd_vel_topic: /cmd_vel

    # Your Gazebo service currently has no /gazebo prefix.
    set_entity_service: /set_entity_state

    model_name: V550_akm_robot
    reference_frame: world

    rear_wheel_command_topic: /rear_wheel_velocity_controller/commands
    steering_command_topic: /steering_position_controller/commands

    max_linear_speed: 1.2
    max_right_front_steering_angle: 0.5
    max_left_front_steering_angle: 0.5

    wheel_base: 0.143
    track_width: 0.162
    wheel_radius: 0.032

    # Fixed Gazebo model height. Increase this if wheels/body penetrate the ground.
    z_offset: 0.05

    # Smooth pose display.
    publish_rate: 30.0
    pose_filter_alpha: 0.12
    yaw_filter_alpha: 0.12

    # If AMCL relocalizes and pose jumps more than this, reset filter immediately.
    reset_jump_distance: 0.8
    reset_jump_yaw: 1.2

    cmd_vel_timeout_sec: 0.5

    # Rear wheel joint axes are 0 -1 0 in your URDF.
    invert_rear_wheel_speed: true
